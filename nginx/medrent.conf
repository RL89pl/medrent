server {
    listen 80;
    server_name medrent.devcage.pl www.medrent.devcage.pl;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name medrent.devcage.pl www.medrent.devcage.pl;

    client_max_body_size 20M;

    # Static files – serwowane bezpośrednio przez nginx
    location /static/ {
        alias /srv/services/medrent/data/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files – serwowane bezpośrednio przez nginx
    location /media/ {
        alias /srv/services/medrent/data/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Wszystko inne → Gunicorn w kontenerze
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
